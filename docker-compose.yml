services:
    db:
        image: postgres:16-alpine
        env_file:
            - .config/.env
        networks:
            - oref-inner-net
        volumes:
            - farsi:/var/lib/postgresql/data
        restart: always

    api:
        build: ./api
        env_file:
            - .config/.env
        volumes:
            - ./.config:/app/.config:ro
        networks:
            - oref-inner-net
        ports:
            - '3001:3001'
        restart: always
    poller:
        build: ./poller
        env_file:
            - .config/.env
        volumes:
            - ./.config:/app/.config:ro
        depends_on:
            - db
        networks:
            - oref-inner-net
        restart: always

volumes:
    farsi:

networks:
    oref-inner-net:
        driver: bridge
